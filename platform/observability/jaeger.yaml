# Jaeger all-in-one (in-memory) as the platform trace store + UI.
# In-memory is fine for a POC; swap for badger/Elasticsearch for persistence.
# OTLP ingestion is enabled so the OTel Collector can export straight to it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: platform-observability
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: caas-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.62.0
          args: ["--query.base-path=/jaeger/ui"]
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: memory
          ports:
            - { name: ui,        containerPort: 16686 }
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
          readinessProbe:
            httpGet: { path: /, port: 16686 }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 600Mi }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: platform-observability
  labels:
    app.kubernetes.io/name: jaeger
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - { name: ui,        port: 16686, targetPort: 16686 }
    - { name: otlp-grpc, port: 4317,  targetPort: 4317 }
    - { name: otlp-http, port: 4318,  targetPort: 4318 }
