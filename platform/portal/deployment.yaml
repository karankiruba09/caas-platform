# Static portal served by the non-root nginx-unprivileged image (listens on
# 8080). The branded index.html is delivered via a ConfigMap (generated from
# index.html by kustomize). Restricted-PSA compliant.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: portal
  labels:
    app: portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: html, mountPath: /usr/share/nginx/html, readOnly: true }
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 96Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: html
          configMap: { name: portal-html }
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
