apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: portal
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
# Generate the ConfigMap from index.html; the name hash makes the Deployment roll
# automatically whenever the page content changes.
configMapGenerator:
  - name: portal-html
    files:
      - index.html
