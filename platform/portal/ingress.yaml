apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal
  namespace: portal
  annotations:
    # HTTP-01 (not the cluster's default Cloudflare DNS-01) so cert issuance does
    # not depend on the Cloudflare API — the portal is publicly reachable on :80.
    cert-manager.io/cluster-issuer: letsencrypt-http01
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: portal.apps.k8-cmb1.gcloud.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal
                port:
                  number: 80
  tls:
    - hosts:
        - portal.apps.k8-cmb1.gcloud.ca
      secretName: portal-tls
