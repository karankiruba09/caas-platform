# HTTP-01 issuer — an alternative to the cluster's default Cloudflare DNS-01
# issuer for hosts that are publicly reachable on :80. Used by the portal so its
# certificate issuance does not depend on the Cloudflare API.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-http01
spec:
  acme:
    email: admin@k8-cmb1.gcloud.ca
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-http01-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
