# Mesh-wide tracing: every sidecar samples traces and ships them via the
# otel-tracing provider (defined in istiod meshConfig) to the platform OTel
# Collector -> Jaeger. 100% sampling for the POC; lower it in production.
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: mesh-default
  namespace: istio-system
spec:
  tracing:
    - providers:
        - name: otel-tracing
      randomSamplingPercentage: 100.0
