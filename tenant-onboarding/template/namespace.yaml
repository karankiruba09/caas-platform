# Tenant boundary. The caas.tenant label is what platform NetworkPolicies and
# Kyverno policies select on, so getting this label right is load-bearing.
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-__TENANT__
  labels:
    caas.tenant: __TENANT__
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
