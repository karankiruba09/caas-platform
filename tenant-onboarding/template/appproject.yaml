# Per-tenant Argo CD AppProject: scopes the tenant's GitOps blast radius. Their
# apps may only deploy INTO their own namespace, only from the approved repo, and
# may not create cluster-scoped resources. This is what makes self-service safe.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: __TENANT__
  namespace: argocd
spec:
  description: "Tenant __TENANT__ — self-service deployments, scoped to tenant-__TENANT__"
  sourceRepos:
    - https://github.com/karankiruba09/caas-platform.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: tenant-__TENANT__
  # Tenants cannot create cluster-scoped resources at all.
  clusterResourceWhitelist: []
  # And only these namespaced kinds inside their namespace.
  namespaceResourceWhitelist:
    - { group: "",                    kind: ConfigMap }
    - { group: "",                    kind: Secret }
    - { group: "",                    kind: Service }
    - { group: "",                    kind: ServiceAccount }
    - { group: "",                    kind: PersistentVolumeClaim }
    - { group: "apps",                kind: Deployment }
    - { group: "apps",                kind: StatefulSet }
    - { group: "batch",               kind: Job }
    - { group: "batch",               kind: CronJob }
    - { group: "networking.k8s.io",   kind: Ingress }
    - { group: "monitoring.coreos.com", kind: ServiceMonitor }
