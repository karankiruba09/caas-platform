# Per-tenant AppProject for the full-stack app. Permits the full set of kinds a
# real stateful application needs (StatefulSet, PVC, Secret, Job, CronJob, HPA,
# PDB, Istio config), still scoped to tenant-wordpress and the approved repo.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: wordpress
  namespace: argocd
spec:
  description: "Tenant wordpress — full-stack app, scoped to tenant-wordpress"
  sourceRepos:
    - https://github.com/karankiruba09/caas-platform.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: tenant-wordpress
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - { group: "",                      kind: ConfigMap }
    - { group: "",                      kind: Secret }
    - { group: "",                      kind: Service }
    - { group: "",                      kind: ServiceAccount }
    - { group: "",                      kind: PersistentVolumeClaim }
    - { group: "apps",                  kind: Deployment }
    - { group: "apps",                  kind: StatefulSet }
    - { group: "batch",                 kind: Job }
    - { group: "batch",                 kind: CronJob }
    - { group: "networking.k8s.io",     kind: Ingress }
    - { group: "autoscaling",           kind: HorizontalPodAutoscaler }
    - { group: "policy",                kind: PodDisruptionBudget }
    - { group: "monitoring.coreos.com", kind: ServiceMonitor }
    - { group: "networking.istio.io",   kind: VirtualService }
    - { group: "networking.istio.io",   kind: DestinationRule }
    - { group: "security.istio.io",     kind: PeerAuthentication }
    - { group: "telemetry.istio.io",    kind: Telemetry }
