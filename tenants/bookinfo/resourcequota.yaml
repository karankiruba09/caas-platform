# Sized for a meshed multi-service app: 6 workloads, each pod also runs an
# istio-proxy sidecar (~100m/128Mi extra), so the quota is larger than the
# default tenant template.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: tenant-bookinfo
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 12Gi
    pods: "30"
    persistentvolumeclaims: "5"
    services: "10"
    services.loadbalancers: "0"
    services.nodeports: "0"
