# Extra cert-manager ClusterIssuers (HTTP-01). The cluster's default
# Cloudflare DNS-01 issuer is provided externally; this adds an HTTP-01 option.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-cert-issuers
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  source:
    repoURL: https://github.com/karankiruba09/caas-platform.git
    targetRevision: main
    path: platform/cert-issuers
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
