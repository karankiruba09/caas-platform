# Customer apps: discovers every apps/<app>/application.yaml and applies it.
# Each of those is a concrete Argo Application that deploys the golden-path chart
# into a tenant namespace under that tenant's (restrictive) AppProject.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: customer-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  source:
    repoURL: https://github.com/karankiruba09/caas-platform.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
      include: '**/application.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
