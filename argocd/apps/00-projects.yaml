# Applies the AppProjects first (sync-wave -1) so later apps can reference them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-projects
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/karankiruba09/caas-platform.git
    targetRevision: main
    path: argocd/projects
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
