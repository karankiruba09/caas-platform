# istiod: the Istio control plane (discovery, sidecar injection webhook, config
# distribution). meshConfig wires distributed tracing to the platform OTel
# Collector over OTLP, so sidecar-generated spans land in Jaeger with no app
# changes. Uses istio-cni so injected pods need no privileged init container.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: istiod
    targetRevision: 1.30.1
    helm:
      releaseName: istiod
      valuesObject:
        # Tell injected sidecars the CNI handles redirection (no init container).
        pilot:
          cni:
            enabled: true
        istio_cni:
          enabled: true
        meshConfig:
          enableTracing: true
          # OTLP tracing provider -> platform OTel Collector.
          extensionProviders:
            - name: otel-tracing
              opentelemetry:
                service: otel-collector.platform-observability.svc.cluster.local
                port: 4317
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  # istiod injects caBundles into its own webhooks at runtime; ignore that drift.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[].clientConfig.caBundle'
    # istiod fully owns the runtime config of its validating webhook (caBundle,
    # failurePolicy, rules); ignore the whole webhooks array.
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
