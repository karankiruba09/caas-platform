# AppProject for platform-owned components (Kyverno, observability, policies).
# Broad permissions — these are cluster-level platform concerns. Tenant apps use
# their own, far more restrictive, per-tenant AppProjects.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: Platform-owned components managed by the platform team
  sourceRepos:
    - https://github.com/karankiruba09/caas-platform.git
    - https://kyverno.github.io/kyverno/
    - https://open-telemetry.github.io/opentelemetry-helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
