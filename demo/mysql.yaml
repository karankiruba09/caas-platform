# Database tier: MySQL as a StatefulSet with a stable identity and its own
# persistent volume (Longhorn, ReadWriteOnce) via volumeClaimTemplates.
# Config comes from a ConfigMap; credentials from the Secret.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: tenant-wordpress
data:
  my.cnf: |
    [mysqld]
    max_connections = 150
    character-set-server = utf8mb4
    collation-server = utf8mb4_unicode_ci
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: tenant-wordpress
  labels:
    app: mysql
spec:
  clusterIP: None          # headless — stable per-pod DNS for the StatefulSet
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: tenant-wordpress
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999          # mysql user
        runAsGroup: 999
        fsGroup: 999            # make the PVC writable by mysql
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: wordpress-db, key: mysql-root-password } }
            - name: MYSQL_DATABASE
              valueFrom: { secretKeyRef: { name: wordpress-db, key: mysql-database } }
            - name: MYSQL_USER
              valueFrom: { secretKeyRef: { name: wordpress-db, key: mysql-user } }
            - name: MYSQL_PASSWORD
              valueFrom: { secretKeyRef: { name: wordpress-db, key: mysql-password } }
          ports:
            - { name: mysql, containerPort: 3306 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/mysql }
            - { name: config, mountPath: /etc/mysql/conf.d }
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h127.0.0.1 -uroot -p\"$MYSQL_ROOT_PASSWORD\""]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3306 }
            initialDelaySeconds: 30
          resources:
            requests: { cpu: 100m, memory: 384Mi }
            limits:   { cpu: "1",  memory: 768Mi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap: { name: mysql-config }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 5Gi
