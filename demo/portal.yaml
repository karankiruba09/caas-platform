# The branded demo front-door (ThinkOn Open-Source K8s Demo). It is part of the
# POC demo, so it lives in the demo's own namespace (tenant-wordpress) rather than
# a namespace of its own. Static content served by the non-root nginx-unprivileged
# image (listens on 8080); the pages are delivered via the portal-html ConfigMap
# (generated from the *.html / logo by kustomize). Restricted-PSA compliant, so it
# runs fine under the namespace's baseline PSA.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: tenant-wordpress
  labels:
    app: portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - { name: html, mountPath: /usr/share/nginx/html, readOnly: true }
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 96Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: html
          configMap: { name: portal-html }
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: tenant-wordpress
  labels:
    app: portal
spec:
  selector:
    app: portal
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal
  namespace: tenant-wordpress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: portal.apps.k8-cmb1.gcloud.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal
                port:
                  number: 80
  tls:
    - hosts:
        - portal.apps.k8-cmb1.gcloud.ca
      secretName: portal-tls
