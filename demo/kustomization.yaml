# The full-stack demo as one bundle: the WordPress app plus the branded portal
# front-door. A single Argo Application syncs all of it into tenant-wordpress —
# the "one commit, whole demo" deployment story.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tenant-wordpress
resources:
  - secret.yaml        # DEMO credentials (see note in file)
  - mysql.yaml         # StatefulSet + headless Service + ConfigMap + PVC
  - wordpress.yaml     # Deployment + Service + PVC(RWX) + ConfigMap + HPA + PDB
  - jobs.yaml          # install Job + backup CronJob + backup PVC
  - ingress.yaml       # nginx -> WordPress with TLS
  - portal.yaml        # demo front-door: Deployment + Service + Ingress
  - mesh.yaml          # STRICT mTLS + DestinationRules (+ portal ingress exception)
# The portal pages are delivered via a generated ConfigMap; the name hash makes
# the portal Deployment roll automatically whenever the page content changes.
configMapGenerator:
  - name: portal-html
    files:
      - index.html
      - platform-onboarding.html
      - app-onboarding.html
      - thinkon-logo.png
