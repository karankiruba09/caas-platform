# Zero-trust ingress for the platform-observability namespace.
# Default-deny, then allow exactly the flows the platform needs.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: platform-observability
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
# Collector -> Jaeger (same namespace) and any in-namespace chatter.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: platform-observability
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
---
# ingress-nginx -> Jaeger UI (16686) and collector OTLP (4317/4318).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: platform-observability
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - { port: 16686, protocol: TCP }
        - { port: 4318,  protocol: TCP }
        - { port: 4317,  protocol: TCP }
---
# Any tenant namespace (labelled caas.tenant=<name>) -> collector OTLP.
# This is how tenant apps ship traces to the platform collector.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tenants-to-collector
  namespace: platform-observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - { key: caas.tenant, operator: Exists }
      ports:
        - { port: 4318, protocol: TCP }
        - { port: 4317, protocol: TCP }
---
# Prometheus (monitoring ns) -> collector internal telemetry (8888) for scrape.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: platform-observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-collector
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - { port: 8888, protocol: TCP }
