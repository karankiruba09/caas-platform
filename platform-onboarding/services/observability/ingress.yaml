# Public endpoints for the platform observability stack:
#   * jaeger.<domain>            -> Jaeger UI (302 to /jaeger/ui base path)
#   * otel-collector.<domain>    -> OTLP/HTTP ingest (4318)
#   * otel-collector-grpc.<...>  -> OTLP/gRPC ingest (4317, backend-protocol GRPC)
# TLS is auto-issued by cert-manager.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ui
  namespace: platform-observability
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/app-root: /jaeger/ui
spec:
  ingressClassName: nginx
  rules:
    - host: jaeger.apps.k8-cmb1.gcloud.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: jaeger, port: { number: 16686 } }
  tls:
    - hosts: [jaeger.apps.k8-cmb1.gcloud.ca]
      secretName: jaeger-ui-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-collector-http
  namespace: platform-observability
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: otel-collector.apps.k8-cmb1.gcloud.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: otel-collector, port: { number: 4318 } }
  tls:
    - hosts: [otel-collector.apps.k8-cmb1.gcloud.ca]
      secretName: otel-collector-http-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-collector-grpc
  namespace: platform-observability
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: otel-collector-grpc.apps.k8-cmb1.gcloud.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: otel-collector, port: { number: 4317 } }
  tls:
    - hosts: [otel-collector-grpc.apps.k8-cmb1.gcloud.ca]
      secretName: otel-collector-grpc-tls
