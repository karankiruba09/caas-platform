# Argo CD UI/API behind the shared ingress controller.
# argocd-server runs in --insecure mode (server.insecure=true, set by
# bootstrap.sh) so nginx terminates TLS and proxies plain HTTP to port 80.
# gRPC (argocd CLI) and the web UI are both served on the same port.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.apps.k8-cmb1.gcloud.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
  tls:
    - hosts:
        - argocd.apps.k8-cmb1.gcloud.ca
      secretName: argocd-server-tls
