# Jaeger (all-in-one), the external OTLP ingress for the collector, the Jaeger
# UI ingress, and the NetworkPolicies for the platform-observability namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-observability-extras
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/karankiruba09/caas-platform.git
    targetRevision: main
    path: platform-onboarding/services/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
