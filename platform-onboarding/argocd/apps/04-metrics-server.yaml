# metrics-server: the resource-metrics API (CPU/memory) that HPA and
# `kubectl top` need. --kubelet-insecure-tls because Rancher/RKE kubelet serving
# certs aren't signed by the cluster CA by default.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-metrics-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    targetRevision: 3.13.1
    helm:
      releaseName: metrics-server
      valuesObject:
        args:
          - --kubelet-insecure-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
