# Tenant scaffolding: applies every tenant-onboarding/tenants/<name>/ (namespace, quota,
# limitrange, RBAC, NetworkPolicy, per-tenant AppProject). Adding a tenant is a
# new directory + a commit; Argo applies it. Templates live under tenant-onboarding/template/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenants
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/karankiruba09/caas-platform.git
    targetRevision: main
    path: tenant-onboarding/tenants
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
