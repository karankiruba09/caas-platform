# Platform trace pipeline: the OpenTelemetry Collector. Receives OTLP from
# tenant apps and exports traces to Jaeger (deployed by 31-observability-extras).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.108.0
    helm:
      releaseName: otel-collector
      valuesObject:
        fullnameOverride: otel-collector
        mode: deployment
        replicaCount: 1
        image:
          repository: otel/opentelemetry-collector-contrib
        command:
          name: otelcol-contrib
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: 500m, memory: 512Mi }
        # POC: disable cluster-wide scrapers; this collector only ingests OTLP.
        presets:
          kubernetesAttributes: { enabled: false }
          kubeletMetrics:        { enabled: false }
          hostMetrics:           { enabled: false }
          clusterMetrics:        { enabled: false }
        ports:
          otlp:
            enabled: true
            containerPort: 4317
            servicePort: 4317
            protocol: TCP
          otlp-http:
            enabled: true
            containerPort: 4318
            servicePort: 4318
            protocol: TCP
        config:
          receivers:
            otlp:
              protocols:
                grpc: { endpoint: 0.0.0.0:4317 }
                http:
                  endpoint: 0.0.0.0:4318
                  cors:
                    allowed_origins: ["http://*", "https://*"]
          processors:
            batch: {}
            memory_limiter:
              check_interval: 5s
              limit_mib: 400
              spike_limit_mib: 100
          exporters:
            otlp/jaeger:
              endpoint: jaeger:4317
              tls: { insecure: true }
            debug: {}
          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [otlp/jaeger, debug]
              metrics:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [debug]
              logs:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [debug]
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
