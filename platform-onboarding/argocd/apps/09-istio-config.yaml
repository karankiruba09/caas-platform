# Mesh-wide Istio config (Telemetry tracing). Wave 2 so it lands after the
# Istio CRDs (base) and istiod are present.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-istio-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: platform
  source:
    repoURL: https://github.com/karankiruba09/caas-platform.git
    targetRevision: main
    path: platform-onboarding/services/istio
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
