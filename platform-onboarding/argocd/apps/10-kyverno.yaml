# Kyverno — the policy engine (admission webhook). Installed via its Helm chart.
# CRDs land here; the ClusterPolicies in tenant-onboarding/policies/ are applied by 20-policies.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.2.6
    helm:
      releaseName: kyverno
      valuesObject:
        # Keep the POC light; bump replicas for production HA.
        admissionController:
          replicas: 1
        backgroundController:
          replicas: 1
        cleanupController:
          replicas: 1
        reportsController:
          replicas: 1
        # Chart default cleanup-job image (bitnami/kubectl) was removed from
        # Docker Hub in 2025; point at the bitnamilegacy mirror so the report
        # cleanup CronJobs can pull.
        cleanupJobs:
          admissionReports:
            image: { registry: docker.io, repository: bitnamilegacy/kubectl, tag: "1.28.5" }
          clusterAdmissionReports:
            image: { registry: docker.io, repository: bitnamilegacy/kubectl, tag: "1.28.5" }
          updateRequests:
            image: { registry: docker.io, repository: bitnamilegacy/kubectl, tag: "1.28.5" }
          ephemeralReports:
            image: { registry: docker.io, repository: bitnamilegacy/kubectl, tag: "1.28.5" }
          clusterEphemeralReports:
            image: { registry: docker.io, repository: bitnamilegacy/kubectl, tag: "1.28.5" }
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
