# Bookinfo, adapted for the CaaS platform: pinned to tenant-bookinfo, hardened to
# run non-root with resource limits (so it passes the Kyverno guardrails), plus
# autoscaling, disruption budget, ingress, and the Istio traffic policies.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tenant-bookinfo

resources:
  - bookinfo.yaml            # upstream deployments + services + serviceaccounts
  - ingress.yaml             # nginx -> productpage with TLS
  - hpa.yaml                 # autoscaling
  - pdb.yaml                 # disruption budgets
  - peerauthentication.yaml  # STRICT mTLS (+ ingress exception)
  - destinationrule.yaml     # subsets v1/v2/v3 + outlier detection
  - virtualservice.yaml      # canary split + retries/timeout + fault injection

patches:
  # Harden every Bookinfo deployment: non-root pod + dropped caps + resources,
  # so the strict Kyverno guardrails stay enforced for this tenant too.
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop: ["ALL"]
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests: { cpu: 50m, memory: 128Mi }
          limits: { cpu: 500m, memory: 512Mi }
  # Run the frontend with 2 replicas so the PDB and rolling updates are meaningful.
  - target:
      kind: Deployment
      name: productpage-v1
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
