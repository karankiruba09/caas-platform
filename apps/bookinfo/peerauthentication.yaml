# Zero-trust: STRICT mTLS for all east-west traffic in the namespace. The
# frontend (productpage) is reached by nginx from OUTSIDE the mesh, so its
# ingress port 9080 is set PERMISSIVE to accept that plaintext while every
# service-to-service call still requires mTLS.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: tenant-bookinfo
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: productpage-ingress
  namespace: tenant-bookinfo
spec:
  selector:
    matchLabels:
      app: productpage
  mtls:
    mode: STRICT
  portLevelMtls:
    "9080":
      mode: PERMISSIVE
