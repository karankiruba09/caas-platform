# North-south: nginx terminates TLS and routes to productpage. East-west between
# the services is handled by the Istio mesh (mTLS). productpage's sidecar accepts
# this ingress traffic via a port-level mTLS exception (see peerauthentication).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookinfo
  namespace: tenant-bookinfo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: bookinfo.apps.k8-cmb1.gcloud.ca
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: productpage
                port:
                  number: 9080
  tls:
    - hosts:
        - bookinfo.apps.k8-cmb1.gcloud.ca
      secretName: bookinfo-tls
