# Traffic management showcase:
#  * reviews: canary — 80% to v1, 20% to v2 (progressive delivery), plus
#    automatic retries and a request timeout (resilience).
#  * ratings: fault injection — a 2s delay on 30% of calls, to demonstrate the
#    retry/timeout behavior above under failure.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: reviews
  namespace: tenant-bookinfo
spec:
  hosts:
    - reviews
  http:
    - route:
        - destination:
            host: reviews
            subset: v1
          weight: 80
        - destination:
            host: reviews
            subset: v2
          weight: 20
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: 5xx,reset,connect-failure
      timeout: 10s
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: ratings
  namespace: tenant-bookinfo
spec:
  hosts:
    - ratings
  http:
    - fault:
        delay:
          percentage:
            value: 30
          fixedDelay: 2s
      route:
        - destination:
            host: ratings
