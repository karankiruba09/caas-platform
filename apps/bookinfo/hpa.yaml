# Autoscaling: scale the frontend on CPU. Needs metrics-server (installed as a
# platform component). Demonstrates the app reacting to load.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: productpage
  namespace: tenant-bookinfo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: productpage-v1
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
