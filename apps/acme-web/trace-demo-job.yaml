# Demo helper: generate traces as "acme-web" and ship them to the platform OTel
# Collector, so they appear in Jaeger. Apply during the demo:
#   kubectl -n tenant-acme apply -f apps/acme-web/trace-demo-job.yaml
# (Not managed by Argo — it's a one-shot for the walkthrough.)
apiVersion: batch/v1
kind: Job
metadata:
  name: acme-web-trace-demo
  namespace: tenant-acme
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acme-web-trace-demo
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: telemetrygen
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
          args:
            - traces
            - --otlp-endpoint=otel-collector.platform-observability.svc.cluster.local:4317
            - --otlp-insecure
            - --traces=50
            - --otlp-attributes=service.name="acme-web"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
