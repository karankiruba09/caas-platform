# Web tier: WordPress (PHP/Apache). 2 replicas sharing a ReadWriteMany volume
# (Longhorn RWX) so it scales horizontally; HPA drives replica count on CPU and a
# PodDisruptionBudget protects availability. An init container waits for MySQL;
# a ConfigMap tunes PHP; the DB connection comes from the Secret.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wordpress-php
  namespace: tenant-wordpress
data:
  uploads.ini: |
    file_uploads = On
    upload_max_filesize = 64M
    post_max_size = 64M
    max_execution_time = 120
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wordpress-content
  namespace: tenant-wordpress
spec:
  accessModes: ["ReadWriteMany"]      # shared across replicas (Longhorn RWX)
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress
  namespace: tenant-wordpress
  labels:
    app: wordpress
spec:
  selector:
    app: wordpress
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: tenant-wordpress
  labels:
    app: wordpress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordpress
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: wordpress
        version: v1
    spec:
      securityContext:
        fsGroup: 33               # www-data, so the shared volume is writable
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.0
          command:
            - sh
            - -c
            - 'until mysqladmin ping -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD" --silent; do echo waiting for mysql; sleep 3; done'
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: wordpress-db, key: mysql-root-password } }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
      containers:
        - name: wordpress
          image: wordpress:6-php8.2-apache
          env:
            - name: WORDPRESS_DB_HOST
              value: mysql:3306
            - name: WORDPRESS_DB_NAME
              valueFrom: { secretKeyRef: { name: wordpress-db, key: mysql-database } }
            - name: WORDPRESS_DB_USER
              valueFrom: { secretKeyRef: { name: wordpress-db, key: mysql-user } }
            - name: WORDPRESS_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: wordpress-db, key: mysql-password } }
            # Behind a TLS-terminating ingress: trust the forwarded proto so
            # WordPress builds https URLs and avoids redirect loops.
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') { $_SERVER['HTTPS'] = 'on'; }
                define('WP_HOME', 'https://wordpress.apps.k8-cmb1.gcloud.ca');
                define('WP_SITEURL', 'https://wordpress.apps.k8-cmb1.gcloud.ca');
          ports:
            - { name: http, containerPort: 80 }
          volumeMounts:
            - { name: content, mountPath: /var/www/html }
            - { name: php, mountPath: /usr/local/etc/php/conf.d/uploads.ini, subPath: uploads.ini }
          readinessProbe:
            httpGet: { path: /wp-login.php, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 60
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 512Mi }
      volumes:
        - name: content
          persistentVolumeClaim: { claimName: wordpress-content }
        - name: php
          configMap: { name: wordpress-php }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wordpress
  namespace: tenant-wordpress
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wordpress
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: wordpress
  namespace: tenant-wordpress
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: wordpress
