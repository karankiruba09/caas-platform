# Tenants must declare CPU/memory requests AND limits on every container.
# Scoped to tenant namespaces (label caas.tenant) so platform/system pods are
# unaffected. Enforced at admission.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require resource requests and limits
    policies.kyverno.io/category: Tenant Guardrails
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-requests-and-limits
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaceSelector:
                matchExpressions:
                  - { key: caas.tenant, operator: Exists }
      validate:
        message: >-
          Every container must set resources.requests and resources.limits
          for both cpu and memory.
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"
