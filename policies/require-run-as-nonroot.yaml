# Tenant containers must run as non-root (set at pod or container level).
# Scoped to tenant namespaces. Enforced at admission.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-nonroot
  annotations:
    policies.kyverno.io/title: Require runAsNonRoot
    policies.kyverno.io/category: Tenant Guardrails
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaceSelector:
                matchExpressions:
                  - { key: caas.tenant, operator: Exists }
      # Opt-out for tenants that explicitly need root (e.g. WordPress/Apache).
      # Label the namespace caas.allow-root=true to take this exception.
      exclude:
        any:
          - resources:
              namespaceSelector:
                matchLabels:
                  caas.allow-root: "true"
      validate:
        message: >-
          Containers must run as non-root: set securityContext.runAsNonRoot=true
          at the pod or container level.
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: "true"
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: "true"
